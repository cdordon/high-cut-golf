<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>High Cut Golf | Premium Golf Apparel & Accessories</title>
    <meta name="description" content="High Cut Golf is for the everyday golfer who wants to look and feel like a PGA pro. Shop our premium hats, shirts, and accessories. Play above the cut.">
    <meta name="keywords" content="golf apparel, golf shirts, golf hats, premium golf gear, High Cut Golf">
    
    <meta property="og:title" content="High Cut Golf | Play above the cut.">
    <meta property="og:description" content="Premium apparel for the everyday golfer.">
    <meta property="og:image" content="/High Cut Golf Logo.svg">
    <meta property="og:url" content="https://gethighcutgolf.com">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
  <body class="bg-[#fdfcfb] text-stone-900 font-sans">
    
    <load src="parts/header.html" />

    <header class="py-20 px-8 text-center max-w-4xl mx-auto">
      <h1 class="text-6xl font-bold tracking-tight mb-4 uppercase">Coming soon to a teebox near you...</h1>
      <p class="text-stone-500 text-lg">Like a birdie putt, you will NOT want to miss this!</p>
    </header>

    <div id="product-grid" class="flex flex-col items-center justify-center py-20 opacity-20">
  <img src="/High Cut Golf Logo.svg" alt="High Cut Golf Logo" class="h-64 w-auto mb-4 animate-pulse" />
  <p class="uppercase text-xs tracking-widest font-bold"></p>
</div>

    <script type="module" src="/main.js"></script>
    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-sm"></div>

<div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white z-[70] shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
  <div class="p-6 border-b border-stone-200 flex justify-between items-center">
    <h2 class="text-xl font-bold uppercase tracking-widest text-green-900">Your Bag</h2>
    <button id="close-cart" class="text-stone-400 hover:text-black uppercase text-xs font-bold tracking-tighter">Close</button>
  </div>
  
  <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
    <p class="text-stone-400 italic">Your bag is as empty as a bunker...</p>
  </div>

  <div class="p-6 border-t border-stone-200">
    <div class="flex justify-between font-bold mb-4">
      <span>Subtotal</span>
      <span id="cart-subtotal">$0.00</span>
    </div>
    <button id="checkout-btn" class="w-full bg-stone-900 text-white py-4 uppercase font-bold tracking-widest hover:bg-green-800 transition">
      Secure Checkout
    </button>
  </div>
</div>
<div id="cookie-banner" class="fixed bottom-0 left-0 w-full bg-stone-900 text-white p-4 text-[10px] uppercase tracking-widest flex justify-between items-center z-50">
  <span>We use cookies to improve your High Cut experience. By staying, you're cool with it.</span>
  <button onclick="document.getElementById('cookie-banner').style.display='none'" class="border border-white px-4 py-1 hover:bg-white hover:text-stone-900 transition">
    Accept
  </button>
</div><load src="/parts/footer.html" />


  </body>
</html>
