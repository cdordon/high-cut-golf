<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Cut Golf | Premium Apparel</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#fdfcfb] text-stone-900 font-sans">
    
    <nav class="flex justify-between items-center p-6 border-b border-stone-200 bg-white sticky top-0 z-50">
  
  <a href="/" class="block">
    <img src="/High Cut Golf Logo.svg" alt="High Cut Golf Logo" class="h-10 w-auto object-contain" />
  </a>

  <div class="flex items-center space-x-6">
    <a href="#product-grid" class="flex items-center space-x-2 group">
      <img src="/High Cut Golf Logo.svg" alt="Mini Logo" class="h-6 w-auto opacity-60 group-hover:opacity-100 transition" />
      <span class="font-bold uppercase text-xs tracking-widest hover:text-green-800 transition"></span>
    </a>

    <div id="cart-count" class="font-medium uppercase text-[10px] tracking-widest border border-stone-900 px-3 py-1 rounded-full cursor-pointer hover:bg-stone-900 hover:text-white transition">
      Cart (0)
    </div>
  </div>

</nav>

    <header class="py-20 px-8 text-center max-w-4xl mx-auto">
      <h1 class="text-6xl font-bold tracking-tight mb-4 uppercase">Coming soon to a teebox near you...</h1>
      <p class="text-stone-500 text-lg">You will NOT want to miss this... unlike that 4 foot "gimme".</p>
    </header>

    <main id="product-grid" class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-12 pb-20">
      <p class="text-stone-400">Fetching the latest drops...</p>
    </main>

    <script type="module" src="/main.js"></script>
    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-sm"></div>

<div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white z-[70] shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
  <div class="p-6 border-b border-stone-200 flex justify-between items-center">
    <h2 class="text-xl font-bold uppercase tracking-widest text-green-900">Your Bag</h2>
    <button id="close-cart" class="text-stone-400 hover:text-black uppercase text-xs font-bold tracking-tighter">Close</button>
  </div>
  
  <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
    <p class="text-stone-400 italic">Your bag is as empty as a bunker...</p>
  </div>

  <div class="p-6 border-t border-stone-200">
    <div class="flex justify-between font-bold mb-4">
      <span>Subtotal</span>
      <span id="cart-subtotal">$0.00</span>
    </div>
    <button id="checkout-btn" class="w-full bg-stone-900 text-white py-4 uppercase font-bold tracking-widest hover:bg-green-800 transition">
      Secure Checkout
    </button>
  </div>
</div>
  </body>
</html>
