<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Out of Bounds | High Cut Golf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fdfcfb] text-stone-900 font-sans min-h-screen flex flex-col">

    <nav class="p-6">
        <a href="/">
            <img src="/High Cut Golf Logo.svg" alt="High Cut Golf Logo" class="h-10 w-auto" />
        </a>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
        <div class="max-w-md">
            <h1 class="text-6xl font-black mb-4 tracking-tighter">404</h1>
            <p class="uppercase text-xs tracking-[0.3em] font-bold text-stone-400 mb-8">Out of Bounds</p>
            
            <div class="mb-10 opacity-40">
                <img src="/High Cut Golf Logo.svg" alt="Bunker" class="h-32 w-auto mx-auto grayscale" />
            </div>

            <h2 class="text-2xl font-bold mb-4 uppercase italic">Looks like you're in the deep stuff.</h2>
            <p class="text-stone-500 mb-10 text-sm leading-relaxed">
                The page you’re looking for went farther than the ball. Jackass!!!!
            </p>

            <a href="/" class="inline-block bg-stone-900 text-white px-10 py-4 uppercase text-xs font-bold tracking-widest hover:bg-stone-800 transition">
                Back to the Fairway
            </a>
        </div>
    </main>

</body>
</html>
