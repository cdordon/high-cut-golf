<nav class="bg-black border-b border-stone-800 relative z-50">
    <div class="flex items-center justify-between p-6 max-w-7xl mx-auto w-full">

        <a href="/" class="flex items-center group">
            <img src="/High Cut Golf Logo.svg" alt="High Cut Golf Logo" class="h-12 w-auto transition-opacity group-hover:opacity-80" />
        </a>

        <div class="hidden md:flex items-center space-x-8 text-[14px] font-bold uppercase tracking-[0.2em] text-stone-400">
            <a href="/about" class="hover:text-[#4D8440] transition-colors duration-300">About</a>
            <a href="/hats" class="hover:text-[#4D8440] transition-colors duration-300">Hats</a>
            <a href="/shirts" class="hover:text-[#4D8440] transition-colors duration-300">Shirts</a>
            <a href="/accessories" class="hover:text-[#4D8440] transition-colors duration-300">Accessories</a>
        </div>

        <button id="mobile-menu-button" class="md:hidden text-stone-400 hover:text-[#4D8440] focus:outline-none transition-colors">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <div id="mobile-menu" class="grid grid-rows-[0fr] transition-[grid-template-rows] duration-300 ease-in-out md:hidden bg-black border-stone-900 shadow-2xl">
        <div class="overflow-hidden">
            <div class="flex flex-col space-y-4 p-8 text-[11px] font-bold uppercase tracking-[0.3em] text-stone-400 border-t border-stone-900">
                <a href="/about" class="hover:text-[#4D8440] transition-colors">About</a>
                <a href="/hats" class="hover:text-[#4D8440] transition-colors">Hats</a>
                <a href="/shirts" class="hover:text-[#4D8440] transition-colors">Shirts</a>
                <a href="/accessories" class="hover:text-[#4D8440] transition-colors">Accessories</a>
            </div>
        </div>
    </div>
</nav>

<script>
    (function() {
        const btn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');

        if (btn && menu) {
            btn.addEventListener('click', () => {
                const isOpen = menu.classList.contains('grid-rows-[1fr]');
                
                // Toggle Grid Height
                menu.classList.toggle('grid-rows-[0fr]', isOpen);
                menu.classList.toggle('grid-rows-[1fr]', !isOpen);
                
                // Optional: Toggle Hamburger to X icon
                if (!isOpen) {
                    icon.setAttribute('d', 'M6 18L18 6M6 6l12 12');
                } else {
                    icon.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                }
            });
        }
    })();
</script>
