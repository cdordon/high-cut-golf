<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shirts | High Cut Golf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K1QHEZG3JG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-K1QHEZG3JG');
    </script>
</head>
<body class="bg-[#fdfcfb] text-stone-900 font-sans overflow-x-hidden">
    
    <load src="parts/background.html" />

    <load src="parts/header.html" />

    <main class="relative z-10 flex flex-col items-center justify-center min-h-[75vh] px-8">
        
        <style>
            @keyframes sync-high-cut {
                0%, 100% { color: #000000; }    
                50% { color: #4D8440; }         
            }
            .animate-sync-text {
                animation: sync-high-cut 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
        </style>

        <div class="reveal-up opacity-0 translate-y-12 scale-90 transition-all duration-1000 ease-out text-center">
            <p class="uppercase text-xl md:text-2xl tracking-[0.2em] font-bold text-stone-500">
                Our <span id="page-category" class="animate-sync-text">Shirts</span> Are Coming Soon
            </p>
            <p class="text-stone-400 text-[10px] uppercase tracking-[0.4em] mt-6 italic">
                You won't want to miss this!
            </p>
        </div>
    </main>

    <load src="parts/cart.html" />

    <load src="/parts/footer.html" />

    <script type="module" src="/main.js"></script>
</body>
</html>
