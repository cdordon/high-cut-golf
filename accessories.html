  <body class="bg-[#fdfcfb] text-stone-900 font-sans">
    
    <load src="parts/header.html" />

    <header class="py-20 px-8 text-center max-w-4xl mx-auto">
      <h1 class="text-6xl font-bold tracking-tight mb-4 uppercase">Coming soon to a teebox near you...</h1>
      <p class="text-stone-500 text-lg"></p>
    </header>

    <div class="flex flex-col items-center justify-center min-h-[60vh] py-20 opacity-20">
  <img src="/High Cut Golf Logo.svg" alt="High Cut Golf Logo" class="h-48 md:h-64 w-auto mb-4 animate-pulse" />
  <p class="uppercase text-sm tracking-[0.2em] font-bold text-center">
    Our <span id="page-category">Accessories</span> Are Coming Soon
  </p>
</div>

    <script type="module" src="/main.js"></script>
    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-sm"></div>

<div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white z-[70] shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
  <div class="p-6 border-b border-stone-200 flex justify-between items-center">
    <h2 class="text-xl font-bold uppercase tracking-widest text-green-900">Your Bag</h2>
    <button id="close-cart" class="text-stone-400 hover:text-black uppercase text-xs font-bold tracking-tighter">Close</button>
  </div>
  
  <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
    <p class="text-stone-400 italic">Your bag is as empty as a bunker...</p>
  </div>

  <div class="p-6 border-t border-stone-200">
    <div class="flex justify-between font-bold mb-4">
      <span>Subtotal</span>
      <span id="cart-subtotal">$0.00</span>
    </div>
    <button id="checkout-btn" class="w-full bg-stone-900 text-white py-4 uppercase font-bold tracking-widest hover:bg-green-800 transition">
      Secure Checkout
    </button>
  </div>
</div><load src="/parts/footer.html" />
